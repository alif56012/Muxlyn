services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/shared:/app/packages/shared
      - ./apps/api/src:/app/apps/api/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web/src:/app/apps/web/src
    command: bun run --cwd apps/web dev --host

  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: muxlyn
      POSTGRES_PASSWORD: muxlyn
      POSTGRES_DB: muxlyn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U muxlyn']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
